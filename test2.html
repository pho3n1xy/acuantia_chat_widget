<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magento Script Test</title>
    <style>
        body {
            height: 2000px;
            background: #eee;
        }
    </style>
</head>

<body>
    <!-- TankBot Chat Widget - With Draggable Bubble -->
    <div id="tankbot-iframe-container"
        style="position: fixed; bottom: 0px; right: 0px; width: 440px; height: 750px; z-index: 999999; clip-path: circle(40px at calc(100% - 48px) calc(100% - 48px)); transition: clip-path 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden;">
        <div style="width: 100%; height: 100%; background: red;"></div>
    </div>

    <!-- Bubble drag grip: sits outside the iframe, always on top -->
    <div id="tankbot-drag-grip" style="
  position: fixed;
  bottom: 68px;
  right: 12px;
  width: 20px;
  height: 20px;
  z-index: 1000000;
  cursor: grab;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 1; /* FORCED OPEN FOR TESTING */
  transition: opacity 0.2s;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
" title="Drag to move">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="white">
            <circle cx="2" cy="2" r="1.2" />
            <circle cx="8" cy="2" r="1.2" />
            <circle cx="2" cy="5" r="1.2" />
            <circle cx="8" cy="5" r="1.2" />
            <circle cx="2" cy="8" r="1.2" />
            <circle cx="8" cy="8" r="1.2" />
        </svg>
    </div>

    <script>
        (function () {
            var container = document.getElementById('tankbot-iframe-container');
            var grip = document.getElementById('tankbot-drag-grip');

            // Restore position/state from previous page
            var currentBottom = parseFloat(localStorage.getItem('tankbot-bottom') || '0');
            var currentRight = parseFloat(localStorage.getItem('tankbot-right') || '0');
            var wasOpen = localStorage.getItem('tankbot-open') === 'true';
            container.style.bottom = currentBottom + 'px';
            container.style.right = currentRight + 'px';
            grip.style.bottom = (currentBottom + 68) + 'px';
            grip.style.right = (currentRight + 12) + 'px';
            if (wasOpen) {
                container.style.clipPath = 'circle(150% at calc(100% - 48px) calc(100% - 48px))';
            }

            // Show grip on hover
            container.addEventListener('mouseenter', function () { grip.style.opacity = '1'; });
            container.addEventListener('mouseleave', function () { grip.style.opacity = '0'; });
            grip.addEventListener('mouseenter', function () { grip.style.opacity = '1'; });
            grip.addEventListener('mouseleave', function () { grip.style.opacity = '0'; });

            var isDragging = false;
            var prevMouseX = 0;
            var prevMouseY = 0;

            function startDrag(startX, startY) {
                isDragging = true;
                prevMouseX = startX;
                prevMouseY = startY;
                document.body.style.userSelect = 'none';
                container.style.transition = 'none';
                grip.style.cursor = 'grabbing';
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }

            function onMouseMove(e) {
                if (!isDragging) return;
                var deltaX = e.clientX - prevMouseX;
                var deltaY = e.clientY - prevMouseY;
                currentBottom -= deltaY;
                currentRight -= deltaX;
                container.style.bottom = currentBottom + 'px';
                container.style.right = currentRight + 'px';
                grip.style.bottom = (currentBottom + 68) + 'px';
                grip.style.right = (currentRight + 12) + 'px';
                prevMouseX = e.clientX;
                prevMouseY = e.clientY;
                localStorage.setItem('tankbot-bottom', currentBottom);
                localStorage.setItem('tankbot-right', currentRight);
            }

            function onMouseUp() {
                if (!isDragging) return;
                isDragging = false;
                document.body.style.userSelect = 'auto';
                container.style.transition = 'clip-path 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                grip.style.cursor = 'grab';
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            // Bubble grip drag (pure Magento, no iframe involved)
            grip.addEventListener('mousedown', function (e) {
                console.log("MOUSEDOWN ON GRIP");
                if (e.button !== 0) return;
                e.preventDefault();
                startDrag(e.clientX, e.clientY);
            });

        })();
    </script>
</body>

</html>
